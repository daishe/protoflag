syntax = "proto3";

package simplecurl.types.v1;

import "google/protobuf/descriptor.proto";

extend google.protobuf.FieldOptions {
  string usage = 0x736374; // 0x736374 - sct - simple curl types
}

message Config {
  Url url = 1 [(usage) = "URL of to connect to"];
  bool verbose = 2 [(usage) = "Controls if the data returned by the server should be printed to stdout"];
}

message Url {
  string scheme = 1 [(usage) = "scheme (ex. 'http' or 'https')"];
  string host = 2 [(usage) = "host"];
  int32 port = 3 [(usage) = "optional port (when not specified port is derived from the scheme)"];
  string path = 4 [(usage) = "requested resource path"];
}
